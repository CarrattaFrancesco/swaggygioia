<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth 3D</title>
    <script>
        // Cache-busting for development - updates CSS links with timestamp
        document.write('<link rel="stylesheet" href="main.css?v=' + Date.now() + '">');
        document.write('<link rel="stylesheet" href="loading-styles.css?v=' + Date.now() + '">');
    </script>
</head>
<body>
    <!-- Loading overlay -->
    <div id="crt-container"></div>

    <!-- Brand logo (centered during load, slides to top-left after) -->
    <img id="brand-logo" src="data/loading.gif" alt="Logo" />
    
    <!-- 3D Container -->
    <div id="container"></div>

    <!-- Card backdrop overlay -->
    <div id="card-backdrop"></div>

    <!-- Project navigation arrows (viewport edges, switch between projects) -->
    <button id="project-prev" class="project-nav-arrow" aria-label="Previous project">&lsaquo;</button>
    <button id="project-next" class="project-nav-arrow" aria-label="Next project">&rsaquo;</button>

    <!-- Project info card (centered modal) -->
    <div id="project-card">
        <button id="card-close" aria-label="Close">&times;</button>
        <div id="card-image-area">
            <img id="card-image" alt="" />
            <button id="carousel-prev" class="card-carousel-arrow" aria-label="Previous">&lsaquo;</button>
            <button id="carousel-next" class="card-carousel-arrow" aria-label="Next">&rsaquo;</button>
        </div>
        <div id="card-info-area">
            <div id="project-counter"></div>
            <h2 id="card-title"></h2>
            <p id="card-description"></p>
            <div id="card-meta">
                <span id="card-category"></span>
                <span id="card-year"></span>
                <span id="card-status"></span>
            </div>
            <div id="card-carousel-nav">
                <span id="carousel-counter"></span>
            </div>
        </div>
    </div>

    <!-- Hover tooltip for posters -->
    <div id="poster-tooltip">Click to view project</div>

    <!-- Onboarding tip (first visit) -->
    <div id="onboarding-tip">
        <span id="onboarding-icon">&#9758;</span>
        <span>Click on the posters to explore the portfolio</span>
        <button id="onboarding-dismiss" aria-label="Dismiss">&times;</button>
    </div>

    <!-- Hidden video for card texture -->
    <video id="cardVideo" style="display: none;" loop muted playsinline crossorigin="anonymous">
        <source src="PHOTOBOOTH_1/TXT/CARD/card_animation.mp4" type="video/mp4">>
    </video>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    
    <!-- Application Scripts -->
    <script>
        // Cache-busting for development - updates JS files with timestamp
        document.write('<script src="loading.js?v=' + Date.now() + '"><\/script>');
        document.write('<script src="app.js?v=' + Date.now() + '"><\/script>');
    </script>
</body>
</html>
